name: Deploy to S3

on:
  push:
    branches:
      - main
      - stage/*

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: "22.19.0"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn vite build

      - name: Deploy to S3
        uses: Reggionick/s3-deploy@v4.0.0
        with:
          # Directory to deploy
          folder: dist
          # Name of AWS Bucket
          bucket: ${{ secrets.S3_BUCKET }}
          # The destination bucket region
          bucket-region: ${{ secrets.AWS_REGION }}
          # AWS CloudFront distribution ID
          dist-id: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          # AWS CloudFront invalidation path(s)
          invalidation: "/*"
          # Removes files in S3 that are not available in the local copy of the directory
          delete-removed: true
          # Use this parameter to specify Cache-Control: no-cache, no-store, must-revalidate header
          no-cache: true
          # Upload files with private ACL, needed for S3 static website hosting
          private: true
          # Sets the Cache-Control: max-age=X header
          cache: "0"
          # Sets the Cache-Control header to immutable
          immutable: true

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL 시크릿이 없어 알림을 건너뜁니다."
            exit 0
          fi
          jq -n \
            --arg title "🚀 프로덕션 배포 완료" \
            --arg desc "$(echo "$COMMIT_MESSAGE" | head -1)" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg run_url "$RUN_URL" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: 5763719,
                fields: [
                  { name: "브랜치", value: $branch, inline: true },
                  { name: "배포자", value: $actor, inline: true },
                  { name: "링크", value: ("[사이트](https://mamma-mia.site) · [배포 로그](" + $run_url + ")") }
                ]
              }]
            }' | curl -sS -X POST -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"
